name: .NET CI & NuGet Package

on:
  push:
    branches:
      - '**'
      - '!master'
    tags:
      - 'v*'
  pull_request:
    branches:
      - '**'
      - '!master'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows x86
          - os: windows-latest
            rid: win-x86
            arch: Win32
            lib: mt32emu.dll
          # Windows x64
          - os: windows-latest
            rid: win-x64
            arch: x64
            lib: mt32emu.dll
          # Windows arm64
          - os: windows-latest
            rid: win-arm64
            arch: ARM64
            lib: mt32emu.dll
          # Linux x64
          - os: ubuntu-latest
            rid: linux-x64
            lib: libmt32emu.so
          # Linux arm64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            lib: libmt32emu.so
          # macOS x64 (cross-compiled on arm64 runner)
          - os: macos-latest
            rid: osx-x64
            arch: x86_64
            lib: libmt32emu.dylib
          # macOS arm64
          - os: macos-latest
            rid: osx-arm64
            arch: arm64
            lib: libmt32emu.dylib

    runs-on: ${{ matrix.os }}
    name: Native ${{ matrix.rid }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: >
          cmake -S mt32emu -B build
          -A ${{ matrix.arch }}
          -DCMAKE_BUILD_TYPE=Release
          -Dlibmt32emu_SHARED=TRUE
          -Dlibmt32emu_C_INTERFACE=TRUE

      - name: Configure CMake (macOS cross-compile)
        if: runner.os == 'macOS'
        run: >
          cmake -S mt32emu -B build
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
          -Dlibmt32emu_SHARED=TRUE
          -Dlibmt32emu_C_INTERFACE=TRUE

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: >
          cmake -S mt32emu -B build
          -DCMAKE_BUILD_TYPE=Release
          -Dlibmt32emu_SHARED=TRUE
          -Dlibmt32emu_C_INTERFACE=TRUE

      - name: Build native library
        run: cmake --build build --config Release

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: |
            build/Release/${{ matrix.lib }}
            build/${{ matrix.lib }}
          if-no-files-found: error
          retention-days: 1

  test-dotnet:
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            lib: mt32emu.dll
          - os: ubuntu-latest
            rid: linux-x64
            lib: libmt32emu.so
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            lib: libmt32emu.so
          - os: macos-latest
            rid: osx-arm64
            lib: libmt32emu.dylib

    runs-on: ${{ matrix.os }}
    name: Test ${{ matrix.rid }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: native-artifact

      - name: Place native library for tests
        shell: bash
        run: |
          set -euo pipefail
          PROJECT_DIR="mt32emu-dotnet/Mt32Emu.Native"
          dest="${PROJECT_DIR}/runtimes/${{ matrix.rid }}/native"
          mkdir -p "$dest"
          src=$(find native-artifact -name "${{ matrix.lib }}" -type f | head -1)
          if [ -z "$src" ]; then
            echo "::error::Native library not found"
            exit 1
          fi
          cp "$src" "$dest/"
          echo "Placed ${src} -> ${dest}/${{ matrix.lib }}"

      - name: Run BDD tests
        run: dotnet test mt32emu-dotnet/Mt32Emu.Native.Specs/Mt32Emu.Native.Specs.csproj -c Release --verbosity normal

  pack-nuget:
    needs: [build-native, test-dotnet]
    runs-on: ubuntu-latest
    name: Pack NuGet

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from cmake project data
        id: version
        run: |
          CMAKE_FILE="mt32emu/cmake/project_data.cmake"
          MAJOR=$(sed -n 's/^set(libmt32emu_VERSION_MAJOR \([0-9]*\))/\1/p' "$CMAKE_FILE")
          MINOR=$(sed -n 's/^set(libmt32emu_VERSION_MINOR \([0-9]*\))/\1/p' "$CMAKE_FILE")
          PATCH=$(sed -n 's/^set(libmt32emu_VERSION_PATCH \([0-9]*\))/\1/p' "$CMAKE_FILE")
          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # Release build: use tag version (strip leading 'v')
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            echo "version=${TAG_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Using tag version: ${TAG_VERSION}"
          else
            # CI build: use cmake version with pre-release suffix
            CI_VERSION="${BASE_VERSION}-ci.${GITHUB_RUN_NUMBER}"
            echo "version=${CI_VERSION}" >> "$GITHUB_OUTPUT"
            echo "Using CI version: ${CI_VERSION}"
          fi

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Arrange native libraries into runtime folders
        run: |
          set -euo pipefail
          PROJECT_DIR="mt32emu-dotnet/Mt32Emu.Native"

          declare -A RID_LIB=(
            ["win-x86"]="mt32emu.dll"
            ["win-x64"]="mt32emu.dll"
            ["win-arm64"]="mt32emu.dll"
            ["linux-x64"]="libmt32emu.so"
            ["linux-arm64"]="libmt32emu.so"
            ["osx-x64"]="libmt32emu.dylib"
            ["osx-arm64"]="libmt32emu.dylib"
          )

          for rid in "${!RID_LIB[@]}"; do
            lib="${RID_LIB[$rid]}"
            dest="${PROJECT_DIR}/runtimes/${rid}/native"
            mkdir -p "$dest"
            # Find the library in the artifact (could be in build/ or build/Release/)
            src=$(find "artifacts/native-${rid}" -name "$lib" -type f | head -1)
            if [ -z "$src" ]; then
              echo "::error::Native library not found for ${rid}"
              exit 1
            fi
            cp "$src" "$dest/"
            echo "Copied ${src} -> ${dest}/${lib}"
          done

      - name: Build and pack NuGet package
        run: dotnet pack mt32emu-dotnet/Mt32Emu.Native/Mt32Emu.Native.csproj -c Release -o nupkg /p:Version=${{ steps.version.outputs.version }}

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: nupkg/*.nupkg
          if-no-files-found: error

  publish-nuget:
    needs: pack-nuget
    runs-on: ubuntu-latest
    name: Publish NuGet
    if: github.event_name == 'push' && github.ref != 'refs/heads/master'

    steps:
      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish to NuGet.org (release tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "${NUGET_API_KEY}" ]; then
            dotnet nuget push nupkg/*.nupkg --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          else
            echo "::warning::NUGET_API_KEY secret is not set, skipping NuGet.org publish"
          fi

      - name: Publish to GitHub Packages
        run: dotnet nuget push nupkg/*.nupkg --api-key "${{ secrets.GITHUB_TOKEN }}" --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
